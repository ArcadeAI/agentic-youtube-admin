databases:
  - name: youtube-admin-db
    plan: free
    databaseName: youtube_admin

services:
  # API Server
  - type: web
    name: youtube-admin-server
    runtime: docker
    dockerfilePath: ./Dockerfile.server
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: youtube-admin-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: BETTER_AUTH_SECRET
        generateValue: true
      - key: BETTER_AUTH_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: ARCADE_API_KEY
        sync: false
      - key: INTERACTIVE_API_KEY
        generateValue: true
      - key: RESEND_API_KEY
        sync: false
      - key: PASSKEY_RP_ID
        sync: false
      - key: RESEND_FROM_EMAIL
        value: "noreply@yourdomain.com"

  # Web Frontend (Static Site)
  - type: web
    name: youtube-admin-web
    runtime: static
    buildCommand: bun install && cd apps/web && bunx vite build
    staticPublishPath: apps/web/dist
    plan: free
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_SERVER_URL
        sync: false
