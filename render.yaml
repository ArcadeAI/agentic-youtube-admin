databases:
  - name: youtube-admin-db
    plan: basic-256mb
    databaseName: youtube_admin

services:
  # API Server
  - type: web
    name: youtube-admin-server
    runtime: docker
    dockerfilePath: ./Dockerfile.server
    plan: starter
    disk:
      name: transcripts
      mountPath: /mnt/transcripts
      sizeGB: 10
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: youtube-admin-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: BETTER_AUTH_SECRET
        generateValue: true
      - key: BETTER_AUTH_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: ARCADE_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: PASSKEY_RP_ID
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: YOUTUBE_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: YT_PROXY_URL
        sync: false
      - key: YT_PROXY_SECRET
        sync: false
      - key: TRANSCRIPT_ROOT
        value: /mnt/transcripts

  # YouTube Transcript Proxy (WARP + yt-dlp + Whisper)
  - type: web
    name: youtube-admin-yt-proxy
    runtime: docker
    dockerfilePath: ./yt-proxy/Dockerfile
    dockerContext: ./yt-proxy
    plan: starter
    envVars:
      - key: YT_PROXY_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false

  # Web Frontend (Static Site)
  - type: web
    name: youtube-admin-web
    runtime: static
    buildCommand: bun install && cd apps/web && bunx vite build
    staticPublishPath: ./apps/web/dist
    headers:
      - path: /*
        name: X-Frame-Options
        value: sameorigin
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_SERVER_URL
        sync: false
